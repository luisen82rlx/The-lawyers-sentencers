<style>
    /* styles.css - diseño simple y profesional */
    
     :root {
        --bg: hsl(229, 6%, 66%);
        --card: #5d7a96;
        --accent: #364966;
        --text: #030303;
        --muted: #6b7280;
        --radius: 12px;
        --container: 1100px;
        font-family: 'Inter', system-ui, Arial, sans-serif;
    }
    
    * {
        box-sizing: border-box
    }
    
    body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        line-height: 1.5;
        font-size: 16px
    }
    
    .container {
        max-width: var(--container);
        margin: 0 auto;
        padding: 1rem
    }
    
    .site-header {
        background: #fff;
        box-shadow: 0 1px 8px rgba(16, 24, 40, .04);
        position: sticky;
        top: 0;
        z-index: 50
    }
    
    .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem
    }
    
    .brand h1 {
        margin: 0;
        font-size: 1.2rem
    }
    
    .brand span {
        color: var(--accent)
    }
    
    .tag {
        margin: 0;
        font-size: .85rem;
        color: var(--muted)
    }
    
    .nav {
        display: flex;
        gap: 1rem;
        align-items: center
    }
    
    .nav a {
        color: var(--text);
        text-decoration: none
    }
    
    .nav .btn {
        background: var(--accent);
        color: #fff;
        padding: .45rem .8rem;
        border-radius: 8px;
        text-decoration: none
    }
    
    .nav-toggle {
        display: none;
        border: 0;
        background: transparent;
        font-size: 1.2rem
    }
    /* hero */
    
    .hero {
        padding: 3rem 0
    }
    
    .hero-grid {
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: 2rem;
        align-items: center
    }
    
    .hero-text h2 {
        font-size: 2rem;
        margin: .2rem 0
    }
    
    .hero-text p {
        color: var(--muted);
        margin-bottom: 1rem
    }
    
    .btn {
        background: var(--accent);
        color: #fff;
        padding: .6rem .9rem;
        border-radius: 10px;
        text-decoration: none;
        display: inline-block
    }
    
    .btn.large {
        padding: 0.9rem 1.2rem;
        font-size: 1rem
    }
    
    .link {
        margin-left: 1rem;
        color: var(--accent);
        text-decoration: none
    }
    /* sections */
    
    .section {
        padding: 2.5rem 0
    }
    
    .section.light {
        background: #fff;
        border-radius: 16px;
        margin: 1rem 0;
        padding: 2.5rem
    }
    
    .section-title {
        margin: 0 0 1rem;
        font-size: 1.3rem
    }
    /* cards */
    
    .cards {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap
    }
    
    .card {
        background: var(--card);
        padding: 1.2rem;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(17, 24, 39, .06);
        flex: 1;
        min-width: 220px
    }
    /* team */
    
    .team-grid {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap
    }
    
    .team-member {
        background: var(--card);
        padding: 1rem;
        border-radius: 12px;
        text-align: center;
        width: 220px
    }
    
    .team-member img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-radius: 8px
    }
    /* testimonials */
    
    .testimonials {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap
    }
    
    .testimonials blockquote {
        background: var(--card);
        padding: 1rem;
        border-radius: 10px;
        flex: 1;
        min-width: 220px
    }
    /* contact */
    
    .contact-grid {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 1.2rem;
        align-items: start
    }
    
    .contact-form {
        background: var(--card);
        padding: 1rem;
        border-radius: 12px
    }
    
    .contact-form label {
        display: block;
        margin-bottom: .8rem;
        color: var(--muted)
    }
    
    .contact-form input,
    .contact-form textarea {
        width: 100%;
        padding: .6rem;
        border-radius: 8px;
        border: 1px solid #e6e9ee;
        margin-top: .3rem
    }
    
    .form-actions {
        display: flex;
        gap: .6rem;
        align-items: center;
        margin-top: .6rem
    }
    
    .contact-info {
        background: transparent;
        padding: 1rem
    }
    /* footer */
    
    .site-footer {
        padding: 1rem 0;
        text-align: center;
        color: var(--muted)
    }
    /* responsive */
    
    @media (max-width:900px) {
        .hero-grid {
            grid-template-columns: 1fr;
            text-align: center
        }
        .hero-image {
            order: -1
        }
        .contact-grid {
            grid-template-columns: 1fr
        }
        .nav {
            display: none
        }
        .nav.open {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 64px;
            right: 16px;
            background: #fff;
            padding: 1rem;
            border-radius: 8px;
            box-shadow: 0 8px 40px rgba(2, 6, 23, .08)
        }
        .nav-toggle {
            display: block
        }
    }
    
    .carrusel {
        position: relative;
        width: 500px;
        height: 300px;
        overflow: hidden;
    }
    
    .carrusel img {
        width: 100%;
        height: 100%;
        display: none;
        object-fit: cover;
    }
    
    .carrusel img.active {
        display: block;
    }
    
    .prev,
    .next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: rgba(0, 0, 0, 0.5);
        color: white;
        border: none;
        padding: 10px;
        font-size: 20px;
        cursor: pointer;
    }
    
    .prev {
        left: 10px;
    }
    
    .next {
        right: 10px;
    }
    
    * {
        margin: 0;
        padding: 0;
        text-decoration: none;
        list-style: none;
    }
    
    body {
        background: linear-gradient( 180deg, rgba(204, 204, 204, 1) 0%, rgba(238, 238, 238, 1) 50%, rgba(204, 204, 204, 1) 100%);

        min-height: 50vh;
    }

        max-width: 1040px;

    .swiper-slide {
        margin-bottom: 50px;

        border-radius: 15px;

    }
